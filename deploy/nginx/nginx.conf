worker_processes auto;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

env SUPABASE_JWT_SECRET;
env SUPABASE_URL;
env SUPABASE_JWKS_URL;
env SUPABASE_JWT_AUDIENCE;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/etc/openresty/?.lua;/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/site/lualib/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;;";
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 5;

    resolver 127.0.0.11 ipv6=off valid=300s;
    resolver_timeout 5s;

    lua_shared_dict rate_limit 10m;
    lua_shared_dict resty_jwt_verification_cache_jwks 2m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    init_by_lua_block {
        local jwt_verify = require "jwt_verify"
        jwt_verify.init()
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" '
                    'upstream_response_time=$upstream_response_time';

    access_log /dev/stdout main;

    # HTTP 重定向到 HTTPS
    server {
        listen 80;
        server_name _;

        location / {
            return 301 https://$host$request_uri;
        }

        location = /health {
            if ($request_method = OPTIONS) {
                return 204;
            }

            default_type text/plain;
            return 200 "ok";
        }
    }

    # HTTPS 主服务
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL 证书配置 - 请替换为你的实际证书路径
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        root /usr/local/openresty/nginx/html;
        index index.html;

        server_tokens off;

        client_max_body_size 100m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://rxllhwqewxiacjliqemf.supabase.co https://api.deepseek.com https://api.siliconflow.cn; frame-ancestors 'none';" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # API 文档仅允许内网访问
        location = /docs {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app:8005/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location ^~ /docs {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app:8005/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /redoc {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app:8005/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location ^~ /redoc {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app:8005/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /openapi.json {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app:8005/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location ^~ /openapi.json {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://app:8005/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location = /health {
            if ($request_method = OPTIONS) {
                return 204;
            }

            default_type text/plain;
            return 200 "ok";
        }

        location ^~ /api/ {
            if ($request_method = OPTIONS) {
                return 204;
            }

            limit_req zone=api_limit burst=60 nodelay;
            limit_req_status 429;

            access_by_lua_block {
                local jwt_verify = require "jwt_verify"
                jwt_verify.verify()
            }

            proxy_pass http://frontend-adapter:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
        }

        location ^~ /agui/ {
            if ($request_method = OPTIONS) {
                return 204;
            }

            limit_req zone=api_limit burst=60 nodelay;
            limit_req_status 429;

            access_by_lua_block {
                local jwt_verify = require "jwt_verify"
                jwt_verify.verify()
            }

            proxy_pass http://frontend-adapter:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
        }

        location ^~ /backend/ {
            if ($request_method = OPTIONS) {
                return 204;
            }

            limit_req zone=api_limit burst=60 nodelay;
            limit_req_status 429;

            access_by_lua_block {
                local jwt_verify = require "jwt_verify"
                jwt_verify.verify()
            }

            proxy_pass http://app:8005/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_buffering off;
            proxy_cache off;
            proxy_connect_timeout 600s;
            proxy_send_timeout 600s;
            proxy_read_timeout 600s;
            proxy_request_buffering off;
        }

        location /assets/ {
            access_log off;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
