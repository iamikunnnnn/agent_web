worker_processes auto;

error_log /dev/stderr warn;
pid /var/run/nginx.pid;

env JWT_SECRET;
env SUPABASE_URL;

events {
    worker_connections 1024;
}

http {
    lua_package_path "/etc/openresty/?.lua;/usr/local/openresty/site/lualib/?.lua;/usr/local/openresty/site/lualib/?/init.lua;/usr/local/openresty/lualib/?.lua;/usr/local/openresty/lualib/?/init.lua;;";

    lua_shared_dict rate_limit 10m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

    log_format main '$remote_addr - [$time_local] "$request" '
                    '$status $body_bytes_sent '
                    '"$http_user_agent" '
                    'upstream_response_time=$upstream_response_time';

    access_log /dev/stdout main;

    server {
        listen 80;
        server_name _;

        server_tokens off;

        client_max_body_size 100m;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header X-XSS-Protection "1; mode=block" always;

        # CORS configuration
        set $cors_origin "";
        if ($http_origin ~* "^(https://os\.agno\.com|http://localhost(:[0-9]+)?)$") {
            set $cors_origin $http_origin;
        }

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-User-Agent, X-Agent-Id, X-Agent-Kind" always;
        add_header Access-Control-Expose-Headers "Content-Disposition" always;
        add_header Access-Control-Allow-Private-Network "true" always;

        location = /health {
            if ($request_method = OPTIONS) {
                return 204;
            }

            default_type text/plain;
            return 200 "ok";
        }

        location / {
            # Handle OPTIONS preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }

            limit_req zone=api_limit burst=60 nodelay;
            limit_req_status 429;

            # access_by_lua_block {
            #     local jwt_verify = require "jwt_verify"
            #     jwt_verify.verify()
            # }

            proxy_pass http://app:8005;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}